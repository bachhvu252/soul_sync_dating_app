<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulSync — Sign Up</title>
  <meta name="description" content="Join SoulSync and find your perfect frequency." />

  <!-- Google Fonts: Public Sans + Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       DESIGN TOKENS
    ============================================================ */
    :root {
      --color-brand-pink: #EE2B7C;
      --text-dark: #1A1A1A;
      --text-label: #374151; /* gray-700 */
      --text-body: #4B5563; /* gray-600 */
      --text-muted: #6B7280; /* gray-500 */
      --border-light: #E5E7EB; /* gray-200 */
      --shadow-primary: 0 4px 6px -4px rgba(0,0,0,.1), 0 10px 15px -3px rgba(0,0,0,.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      /* Full page background image stretching */
      background: #000 url('./public/login-bg.png') no-repeat center center / cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dark);
      padding: 24px;
    }

    a { text-decoration: none; color: inherit; }

    /* ============================================================
       MAIN SIGNUP CONTAINER
    ============================================================ */
    .signup-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      width: 100%;
      max-width: 480px;
      z-index: 10;
    }

    .signup-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      animation: fadeUp 0.6s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       BRANDING & LOGO
    ============================================================ */
    .branding {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
      width: 100%;
      text-align: center;
    }

    .logo-img {
      width: auto;
      max-width: 200px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-family: 'Public Sans', sans-serif;
      font-weight: 500;
      font-size: 16px;
      line-height: 24px;
      color: var(--color-brand-pink);
    }

    /* ============================================================
       FORM ELEMENTS
    ============================================================ */
    .signup-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 16px;
      width: 100%;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .input-label {
      font-family: 'Public Sans', sans-serif;
      font-weight: 700;
      font-size: 13px;
      line-height: 20px;
      color: var(--text-label);
    }

    .input-field {
      width: 100%;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 12px 16px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field::placeholder { color: var(--text-muted); }
    .input-field:focus {
      border-color: var(--color-brand-pink);
      box-shadow: 0 0 0 3px rgba(238, 43, 124, 0.15);
    }

    .terms-group {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 4px;
    }

    .checkbox {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      border: 1px solid #D1D5DB;
      border-radius: 4px;
      accent-color: var(--color-brand-pink);
      flex-shrink: 0;
    }

    .terms-label {
      font-family: 'Public Sans', sans-serif;
      font-weight: 400;
      font-size: 13px;
      line-height: 20px;
      color: var(--text-body);
      cursor: pointer;
    }
    .terms-label a { color: var(--color-brand-pink); font-weight: 600; text-decoration: underline;}

    /* ============================================================
       SUBMIT BUTTON
    ============================================================ */
    .btn-submit {
      width: 100%;
      height: 56px;
      background: var(--color-brand-pink);
      color: #fff;
      font-family: 'Public Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: var(--shadow-primary);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-top: 8px;
    }
    .btn-submit:hover {
      background: #d41e6e;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(238,43,124,.35);
    }

    /* ============================================================
       FOOTER ACTIONS
    ============================================================ */
    .footer-action {
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      color: var(--text-muted);
    }

    .footer-action .join-link {
      font-weight: 700;
      color: var(--color-brand-pink);
      transition: color 0.2s;
    }
    .footer-action .join-link:hover { color: #d41e6e; }

    /* ============================================================
       BOTTOM LINKS (Privacy, Terms, Safety)
    ============================================================ */
    .bottom-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      width: 100%;
      animation: fadeUp 0.8s ease-out;
    }

    .bottom-link {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      transition: color 0.2s;
    }
    .bottom-link:hover { color: #fff; }

    @media (max-width: 480px) {
      .signup-card { padding: 32px 24px; }
      .bottom-links { gap: 16px; flex-wrap: wrap; }
      .input-row { flex-direction: column; gap: 20px; }
    }
  </style>
</head>

<body>
  <div class="signup-wrapper">
    <div class="signup-card">
      
      <!-- Branding -->
      <div class="branding">
        <a href="/">
          <img class="logo-img" src="./public/login-logo.png" alt="SoulSync Logo" />
        </a>
        <p class="subtitle">Join the Vibe.</p>
      </div>

      <!-- Form -->
      <form class="signup-form" id="signup-form">
        
        <div class="input-row">
          <!-- First Name -->
          <div class="input-group">
            <div class="label-row"><label class="input-label" for="fname">First Name</label></div>
            <input class="input-field" type="text" id="fname" placeholder="Jane" required />
          </div>
          <!-- Last Name -->
          <div class="input-group">
            <div class="label-row"><label class="input-label" for="lname">Last Name</label></div>
            <input class="input-field" type="text" id="lname" placeholder="Doe" required />
          </div>
        </div>

        <!-- Email Input -->
        <div class="input-group">
          <div class="label-row">
            <label class="input-label" for="email">Email Address</label>
          </div>
          <input class="input-field" type="email" id="email" placeholder="your@email.com" required />
        </div>

        <!-- Password Input -->
        <div class="input-group">
          <div class="label-row">
            <label class="input-label" for="password">Password</label>
          </div>
          <input class="input-field" type="password" id="password" placeholder="Create a strong password" required />
        </div>
        
        <!-- Date of Birth Input -->
        <div class="input-group">
          <div class="label-row">
            <label class="input-label" for="dob">Date of Birth</label>
          </div>
          <input class="input-field" type="date" id="dob" required style="color: var(--text-muted);"/>
        </div>

        <!-- Terms and Conditions -->
        <div class="terms-group">
          <input class="checkbox" type="checkbox" id="terms" required />
          <label class="terms-label" for="terms">
            I agree to SoulSync's <a href="#">Terms of Service</a>, <a href="#">Privacy Policy</a>, and confirm I am over 18 years old.
          </label>
        </div>

        <!-- Submit -->
        <button class="btn-submit" type="submit">Create Account</button>

      </form>

      <!-- Footer Action -->
      <p class="footer-action">
        Already have an account? <a href="/login.html" class="join-link">Log Back In</a>
      </p>

    </div>

    <!-- Bottom Links -->
    <div class="bottom-links">
      <a href="#" class="bottom-link">Privacy Policy</a>
      <a href="#" class="bottom-link">Terms of Service</a>
      <a href="#" class="bottom-link">Safety Tips</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = '/profile.html';

    // Fix date input color
    document.getElementById('dob').addEventListener('change', function() {
      if (this.value) this.style.color = 'var(--text-dark)';
    });

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('.btn-submit');

      const first_name = document.getElementById('fname').value.trim();
      const last_name  = document.getElementById('lname').value.trim();
      const email      = document.getElementById('email').value.trim();
      const password   = document.getElementById('password').value;
      const dob        = document.getElementById('dob').value; // YYYY-MM-DD

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        await api.auth.register({
          first_name,
          last_name: last_name || undefined,
          email,
          password,
          date_of_birth: dob || undefined,
          gender: 'other', // default; user can update in edit-profile
        });
        showToast('Account created! Taking you to your profile...', 'success');
        setTimeout(() => { window.location.href = '/profile.html'; }, 900);
      } catch (err) {
        showToast(err.message || 'Registration failed. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
