<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulSync — Login</title>
  <meta name="description" content="Log in to SoulSync and find your perfect frequency." />

  <!-- Google Fonts: Public Sans + Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       DESIGN TOKENS
    ============================================================ */
    :root {
      --color-brand-pink: #EE2B7C;
      --text-dark: #1A1A1A;
      --text-label: #374151; /* gray-700 */
      --text-body: #4B5563; /* gray-600 */
      --text-muted: #6B7280; /* gray-500 */
      --border-light: #E5E7EB; /* gray-200 */
      --shadow-primary: 0 4px 6px -4px rgba(0,0,0,.1), 0 10px 15px -3px rgba(0,0,0,.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      /* Full page background image stretching */
      background: #000 url('./public/login-bg.png') no-repeat center center / cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dark);
      padding: 24px;
    }

    /* Fallback if local image fails */
    .bg-fallback {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      object-fit: cover;
    }

    a { text-decoration: none; color: inherit; }

    /* ============================================================
       MAIN LOGIN CONTAINER
    ============================================================ */
    .login-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      width: 100%;
      max-width: 448px;
      z-index: 10;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      padding: 48px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      animation: fadeUp 0.6s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       BRANDING & LOGO
    ============================================================ */
    .branding {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      width: 100%;
      text-align: center;
    }

    .logo-img {
      width: auto;
      max-width: 258px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-family: 'Public Sans', sans-serif;
      font-weight: 500;
      font-size: 16px;
      line-height: 24px;
      color: var(--color-brand-pink);
    }

    /* ============================================================
       FORM ELEMENTS
    ============================================================ */
    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin-bottom: 32px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .input-label {
      font-family: 'Public Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      line-height: 20px;
      color: var(--text-label);
    }

    .forgot-link {
      font-family: 'Public Sans', sans-serif;
      font-weight: 500;
      font-size: 12px;
      line-height: 16px;
      color: var(--color-brand-pink);
      transition: color 0.2s;
    }
    .forgot-link:hover { color: #d41e6e; }

    .input-field {
      width: 100%;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      line-height: 20px;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field::placeholder { color: var(--text-muted); }
    .input-field:focus {
      border-color: var(--color-brand-pink);
      box-shadow: 0 0 0 3px rgba(238, 43, 124, 0.15);
    }

    .remember-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox {
      width: 16px;
      height: 16px;
      border: 1px solid #D1D5DB;
      border-radius: 4px;
      accent-color: var(--color-brand-pink);
    }

    .remember-label {
      font-family: 'Public Sans', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 20px;
      color: var(--text-body);
      user-select: none;
      cursor: pointer;
    }

    /* ============================================================
       SUBMIT BUTTON
    ============================================================ */
    .btn-submit {
      width: 100%;
      height: 60px;
      background: var(--color-brand-pink);
      color: #fff;
      font-family: 'Public Sans', sans-serif;
      font-weight: 600;
      font-size: 16px;
      line-height: 28px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: var(--shadow-primary);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-top: 8px;
    }
    .btn-submit:hover {
      background: #d41e6e;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(238,43,124,.35);
    }

    /* ============================================================
       FOOTER ACTIONS
    ============================================================ */
    .footer-action {
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      color: var(--text-muted);
    }

    .footer-action .join-link {
      font-weight: 700;
      color: var(--color-brand-pink);
      transition: color 0.2s;
    }
    .footer-action .join-link:hover { color: #d41e6e; }

    /* ============================================================
       BOTTOM LINKS (Privacy, Terms, Safety)
    ============================================================ */
    .bottom-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      width: 100%;
      animation: fadeUp 0.8s ease-out;
    }

    .bottom-link {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      transition: color 0.2s;
    }
    .bottom-link:hover { color: #fff; }

    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
      .bottom-links { gap: 16px; flex-wrap: wrap; }
    }
  </style>
</head>

<body>
  <!-- Fallback background just in case CSS fails to load the local file -->
  <img src="https://s3-alpha-sig.figma.com/img/9bd3/e3c7/1ea23fe4d0709a908e134bace556195b?Expires=1776643200&Key-Pair-Id=APKAQ4GOSFWCW27IBOMQ&Signature=rtF6z8at9WWhD7nw03fDtdwvFlCTMDv6rl5AWVIbzboMWGEdmvE6~4aVqbzNFuWj6st8F144XiSHJj-bSN1VlwvpspWl2kyzRN1VCShhaoqBuhAulvt9QDWqq8YCAY72GY3iE-EBv63InxiMZ0~6~46gTqWmfSZzL6lbv2nzlg3Fmp~ttQEUdNAbf-Tga14IAowWSQ5nl55H6UoCHT5bxmZ4zV46TllIKmQPrD0I75EYPEct71nJ3P0G1xA-C83fntC3yhQahhY6e17nNZ1dP7XbHtn6XJEWDee~S1roYZ~YBXgwWn2wj8IX6eCIvrOpbAyxOpqd4nydRLfqN7U0Aw__" onerror="this.style.display='none'" class="bg-fallback" alt="" aria-hidden="true" />

  <div class="login-wrapper">
    <div class="login-card">
      
      <!-- Branding -->
      <div class="branding">
        <a href="/">
          <img class="logo-img" src="./public/login-logo.png" onerror="this.src='https://figma-alpha-api.s3.us-west-2.amazonaws.com/images/95f372b8-a4c4-44e7-b5a6-d827bda5f541'" alt="SoulSync Logo" />
        </a>
        <p class="subtitle">Ready to find your match?</p>
      </div>

      <!-- Form -->
      <form class="login-form" action="/" method="GET" onsubmit="event.preventDefault(); window.location.href='/';">
        
        <!-- Email Input -->
        <div class="input-group">
          <div class="label-row">
            <label class="input-label" for="email">Email Address</label>
          </div>
          <input class="input-field" type="email" id="email" placeholder="your@email.com" required />
        </div>

        <!-- Password Input -->
        <div class="input-group">
          <div class="label-row">
            <label class="input-label" for="password">Password</label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <input class="input-field" type="password" id="password" placeholder="••••••••" required />
        </div>

        <!-- Remember Me -->
        <div class="input-group remember-group" style="flex-direction: row; margin-top: -8px;">
          <input class="checkbox" type="checkbox" id="remember" />
          <label class="remember-label" for="remember">Keep me in sync</label>
        </div>

        <!-- Submit -->
        <button class="btn-submit" type="submit">Sync In</button>

      </form>

      <!-- Footer Action -->
      <p class="footer-action">
        Don't have an account yet? <a href="/signup.html" class="join-link">Join the Vibe</a>
      </p>

    </div>

    <!-- Bottom Links -->
    <div class="bottom-links">
      <a href="#" class="bottom-link">Privacy Policy</a>
      <a href="#" class="bottom-link">Terms of Service</a>
      <a href="#" class="bottom-link">Safety Tips</a>
    </div>
  </div>

</body>
</html>
