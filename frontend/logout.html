<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulSync — Log Out</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       DESIGN TOKENS
    ============================================================ */
    :root {
      --color-primary: #EE2B7C;
      --text-dark: #111827;
      --text-muted: #4B5563;
      
      --font-display: 'Public Sans', sans-serif;
      --font-body: 'Space Grotesk', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html {
      height: 100%;
      font-family: var(--font-body);
      background-color: #FDF2F8; /* Fallback */
    }

    /* ============================================================
       BACKGROUND & LAYOUT
    ============================================================ */
    .bg-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      background-image: url('./public/logout-bg.png');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Slight radial gradient over the background to make the white card pop */
    .bg-wrapper::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 70%);
      pointer-events: none;
    }

    .footer-text {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(0, 0, 0, 0.4);
      letter-spacing: 1px;
      font-weight: 500;
    }

    /* ============================================================
       LOGOUT CARD
    ============================================================ */
    .logout-card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      width: 100%;
      max-width: 420px;
      padding: 48px 40px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .logo {
      height: 48px;
      margin-bottom: 32px;
    }

    .title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .sparkle {
      font-size: 18px;
      color: #FBBF24; /* yellow sparkle */
      margin-bottom: 32px;
    }

    .btn-login {
      display: block;
      width: 100%;
      background: var(--color-primary); /* Pink */
      color: white;
      text-decoration: none;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 15px;
      padding: 14px;
      border-radius: 8px;
      transition: opacity 0.2s, transform 0.2s;
      margin-bottom: 24px;
      box-shadow: 0 4px 6px -1px rgba(238, 43, 124, 0.2);
    }
    
    .btn-login:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .stay-sync {
      font-size: 12px;
      color: #9CA3AF;
      font-weight: 500;
    }

  </style>
</head>
<body>

  <div class="bg-wrapper">
    
    <!-- Centered Card -->
    <div class="logout-card">
      <a href="/">
        <img src="./public/login-logo.png" alt="SoulSync" class="logo" onerror="this.src='https://figma-alpha-api.s3.us-west-2.amazonaws.com/images/95f372b8-a4c4-44e7-b5a6-d827bda5f541'">
      </a>
      
      <h1 class="title">See You Soon!</h1>
      <p class="subtitle">
        Hope you found a spark today. Whether it's a deep conversation or a quick hello, we're glad you stopped by.
      </p>
      
      <div class="sparkle">✨</div>
      
      <a href="/login.html" class="btn-login">Log Back In</a>
      
      <p class="stay-sync">Stay in sync. In love.</p>
    </div>

    <div class="footer-text">© 2023 SOULSYNC INC.</div>
    
  </div>

</body>
</html>
